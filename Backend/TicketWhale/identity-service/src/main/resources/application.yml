server:
    port: 8081

spring:
    application:
        name: identity-service

    datasource:
        url: jdbc:postgresql://localhost:5432/identity_db
        username: postgres
        password: 123456
        driver-class-name: org.postgresql.Driver

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                format_sql: true
                dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
    secret: "your-256-bit-secret-key-here-must-be-very-long-for-security"
    expiration: 86400000