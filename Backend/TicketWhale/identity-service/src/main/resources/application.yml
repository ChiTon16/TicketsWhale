server:
    port: ${PORT:8081}

spring:
    application:
        name: identity-service
    datasource:
        url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/identity_db}
        username: ${SPRING_DATASOURCE_USERNAME:postgres}
        password: ${SPRING_DATASOURCE_PASSWORD:123456}
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: false
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-here-must-be-very-long-for-security}
    expiration: 86400000        # 1 ngày (ms)
    refresh-expiration: 604800000 # 7 ngày (ms)