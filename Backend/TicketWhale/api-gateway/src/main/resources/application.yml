server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: identity-service-public
          uri: ${IDENTITY_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**

        - id: ticketing-service
          uri: ${TICKETING_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/bookings/**
          filters:
            - JwtAuthentication

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-must-be-very-long-for-security}